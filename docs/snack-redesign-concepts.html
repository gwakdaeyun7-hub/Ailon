<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailon 학문스낵 — 6 Concepts × Light/Dark × KO/EN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:#0E0D0B;color:#E7E5E4;-webkit-font-smoothing:antialiased}

/* ========== PAGE ========== */
.pg{text-align:center;padding:40px 16px 16px;max-width:900px;margin:0 auto}
.pg h1{font-family:'Lora',serif;font-size:24px;font-weight:700;color:#14B8A6;margin-bottom:6px}
.pg p{color:#78716C;font-size:12px}

/* ========== CONTROLS ========== */
.ctrl{position:sticky;top:0;z-index:100;background:#0E0D0B;border-bottom:1px solid #1A1816;padding:10px 12px 8px}
.ctrl-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.ctrl-row:last-child{margin-bottom:0}
.ctrl button{padding:7px 13px;border:1px solid #302B28;border-radius:8px;background:#1A1816;color:#A8A29E;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.ctrl button:hover{border-color:#14B8A6;color:#14B8A6}
.ctrl button.on{background:#14B8A6;border-color:#14B8A6;color:#0E0D0B}
.ctrl .sep{width:1px;background:#302B28;margin:0 4px}
.toggle-row{display:flex;justify-content:center;gap:12px;align-items:center}
.toggle-row label{font-size:11px;color:#78716C;cursor:pointer;display:flex;align-items:center;gap:4px}
.toggle-row input{accent-color:#14B8A6}

/* ========== PHONE GRID ========== */
.grid{max-width:900px;margin:0 auto;padding:16px 12px 60px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.phone-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.phone-col .plbl{font-size:9px;font-weight:700;color:#78716C;letter-spacing:1px;text-transform:uppercase}
.phone{width:375px;max-width:calc(100vw - 32px);border-radius:32px;overflow:hidden;border:3px solid #302B28;transition:border-color .2s}
.phone .sb{height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:11px;font-weight:600}
.phone .scr{overflow-y:auto;max-height:740px}
.phone .pb{height:3px}
.phone .pb .f{height:3px;width:35%;border-radius:0 2px 2px 0}

/* ========== CONCEPT SECTIONS ========== */
.concept{display:none}
.concept.show{display:block}
.c-hdr{text-align:center;padding:20px 16px 12px}
.c-hdr h2{font-family:'Lora',serif;font-size:18px;color:#E7E5E4;margin-bottom:3px}
.c-hdr p{font-size:11px;color:#78716C;line-height:1.5}
.c-tags{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.c-tags span{font-size:9px;color:#A8A29E;background:#211D1B;border:1px solid #302B28;border-radius:10px;padding:2px 7px}

/* ========== ICONS (SVG) ========== */
svg.ic{flex-shrink:0}

/* ========================================
   LIGHT THEME TOKENS
   ======================================== */
.lt{background:#FAF9F6;color:#1C1917}
.lt .sb{color:#1C1917;background:#FAF9F6}
.lt .pb{background:#E7E5E4}
.lt .pb .f{background:#0D7377}
/* shared light */
.lt .hdr{padding:18px 18px 0}
.lt .hdr .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lt .hdr .tl{font-size:12px;font-weight:600;color:#A8A29E}
.lt .hdr .dt{font-size:10px;color:#78716C}
.lt .bgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.lt .b{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;border-radius:14px;padding:3px 8px}
.lt .b.cat{background:#F0FDFA;color:#0D7377}
.lt .b.dif{background:#FFFBEB;color:#B45309}
.lt .b.tm{background:#F5F2EE;color:#A8A29E}
.lt .hero{font-family:'Lora',serif;font-size:22px;font-weight:700;color:#1C1917;line-height:1.28;margin-bottom:4px}
.lt .hero-s{font-family:'Lora',serif;font-style:italic;font-size:13px;color:#78716C;margin-bottom:12px}
.lt .div{width:24px;height:3px;background:#0D7377;border-radius:2px;margin-bottom:16px}
.lt .seg{display:flex;background:#F5F2EE;border-radius:9px;padding:2px;margin:0 18px 18px}
.lt .seg div{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:12px;font-weight:500;color:#A8A29E;cursor:pointer}
.lt .seg div.on{background:#FFF;color:#1C1917;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.05)}
/* light card */
.lt .card{background:#FFF;border-radius:13px;border:1px solid #E7E5E4;box-shadow:0 1px 3px rgba(0,0,0,.03);overflow:hidden}
.lt .card .bl{border-left:3px solid #0D7377}
.lt .card .bl.amb{border-left-color:#B45309}
.lt .cl{font-size:9px;font-weight:700;color:#A8A29E;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:8px}
.lt .cl svg{width:13px;height:13px;color:#0D7377}
.lt .cl.amb svg{color:#B45309}
.lt .ch{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#1C1917;line-height:1.4;margin-bottom:6px}
.lt .cb{font-size:12px;line-height:1.65;color:#78716C;margin-bottom:8px}
.lt .cs{border-radius:7px;padding:8px 10px;font-size:11px;line-height:1.45;display:flex;align-items:flex-start;gap:5px}
.lt .cs svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
.lt .cs.tl{background:#F0FDFA;color:#0D7377}
.lt .cs.am{background:#FFFBEB;color:#B45309}
.lt .kws{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.lt .kw{font-size:9px;font-weight:600;color:#78716C;background:#F5F2EE;border-radius:10px;padding:2px 7px}
.lt .act{display:flex;gap:6px;padding:8px 18px 16px}
.lt .ab{display:flex;align-items:center;gap:4px;background:#F5F2EE;border:1px solid #E7E5E4;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;color:#A8A29E}
.lt .ab svg{width:13px;height:13px}

/* ========================================
   DARK THEME TOKENS
   ======================================== */
.dk{background:#1A1816;color:#E7E5E4}
.dk .sb{color:#E7E5E4;background:#1A1816}
.dk .pb{background:#302B28}
.dk .pb .f{background:#14B8A6}
.dk .hdr{padding:18px 18px 0}
.dk .hdr .r1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dk .hdr .tl{font-size:12px;font-weight:600;color:#78716C}
.dk .hdr .dt{font-size:10px;color:#78716C}
.dk .bgs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.dk .b{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;border-radius:14px;padding:3px 8px}
.dk .b.cat{background:#112525;color:#2DD4BF}
.dk .b.dif{background:#2D2513;color:#FBBF24}
.dk .b.tm{background:#211D1B;color:#78716C}
.dk .hero{font-family:'Lora',serif;font-size:22px;font-weight:700;color:#E7E5E4;line-height:1.28;margin-bottom:4px}
.dk .hero-s{font-family:'Lora',serif;font-style:italic;font-size:13px;color:#78716C;margin-bottom:12px}
.dk .div{width:24px;height:3px;background:#14B8A6;border-radius:2px;margin-bottom:16px}
.dk .seg{display:flex;background:#211D1B;border-radius:9px;padding:2px;margin:0 18px 18px}
.dk .seg div{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:12px;font-weight:500;color:#78716C;cursor:pointer}
.dk .seg div.on{background:#231F1D;color:#E7E5E4;font-weight:700;border:1px solid #302B28}
.dk .card{background:#231F1D;border-radius:13px;border:1px solid #302B28;overflow:hidden}
.dk .card .bl{border-left:3px solid #14B8A6}
.dk .card .bl.amb{border-left-color:#F59E0B}
.dk .cl{font-size:9px;font-weight:700;color:#78716C;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-bottom:8px}
.dk .cl svg{width:13px;height:13px;color:#2DD4BF}
.dk .cl.amb svg{color:#F59E0B}
.dk .ch{font-family:'Lora',serif;font-size:14px;font-weight:700;color:#E7E5E4;line-height:1.4;margin-bottom:6px}
.dk .cb{font-size:12px;line-height:1.65;color:#A8A29E;margin-bottom:8px}
.dk .cs{border-radius:7px;padding:8px 10px;font-size:11px;line-height:1.45;display:flex;align-items:flex-start;gap:5px}
.dk .cs svg{width:13px;height:13px;flex-shrink:0;margin-top:1px}
.dk .cs.tl{background:#112525;color:#2DD4BF}
.dk .cs.am{background:#2D2513;color:#FBBF24}
.dk .kws{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.dk .kw{font-size:9px;font-weight:600;color:#A8A29E;background:#2A2624;border-radius:10px;padding:2px 7px}
.dk .act{display:flex;gap:6px;padding:8px 18px 16px}
.dk .ab{display:flex;align-items:center;gap:4px;background:#211D1B;border:1px solid #302B28;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;color:#78716C}
.dk .ab svg{width:13px;height:13px}

/* ========== PER-CONCEPT UNIQUE ========== */
/* A: Timeline rail */
.cA .tl-area{padding:0 18px 10px;position:relative}
.cA .rail{position:absolute;left:27px;top:0;bottom:0;width:3px;border-radius:2px}
.lt .cA .rail{background:linear-gradient(#0D7377,#0D737780,#B4530960)}
.dk .cA .rail{background:linear-gradient(#14B8A6,#14B8A680,#F59E0B60)}
.cA .step{position:relative;padding-left:28px;margin-bottom:20px}
.cA .step:last-child{margin-bottom:6px}
.cA .nd{position:absolute;left:-8px;top:14px;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1}
.cA .nd svg{width:12px;height:12px}
.lt .cA .nd{background:#F0FDFA;border:2px solid #0D7377}
.lt .cA .nd svg{color:#0D7377}
.lt .cA .nd.amb{background:#FFFBEB;border-color:#B45309}
.lt .cA .nd.amb svg{color:#B45309}
.dk .cA .nd{background:#112525;border:2px solid #14B8A6}
.dk .cA .nd svg{color:#2DD4BF}
.dk .cA .nd.amb{background:#2D2513;border-color:#F59E0B}
.dk .cA .nd.amb svg{color:#F59E0B}
.cA .card{padding:16px}

/* B: Magazine big numbers */
.cB .vol{font-family:'Lora',serif;font-size:11px;font-weight:700;letter-spacing:1.5px}
.lt .cB .vol{color:#B45309}
.dk .cB .vol{color:#F59E0B}
.cB .orn{text-align:center;font-size:12px;letter-spacing:6px;margin-bottom:16px}
.lt .cB .orn{color:#E7E5E4}
.dk .cB .orn{color:#302B28}
.cB .chapters{padding:0 18px 10px}
.cB .ch-wrap{margin-bottom:24px}
.cB .ch-wrap:last-child{margin-bottom:6px}
.cB .num{font-family:'Lora',serif;font-size:40px;font-weight:700;line-height:1;margin-bottom:-4px}
.lt .cB .num{color:#E7E5E4}
.dk .cB .num{color:#302B28}
.cB .lr{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cB .lr svg{width:12px;height:12px}
.lt .cB .lr svg{color:#0D7377}
.dk .cB .lr svg{color:#14B8A6}
.cB .lr .en{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
.lt .cB .lr .en{color:#0D7377}
.dk .cB .lr .en{color:#14B8A6}
.cB .lr .ko{font-size:9px;font-weight:600}
.lt .cB .lr .ko{color:#78716C}
.dk .cB .lr .ko{color:#78716C}
.cB .card{padding:16px}
.cB .seg-line{display:flex;border-bottom-width:1px;border-bottom-style:solid;margin:0 18px 18px}
.lt .cB .seg-line{border-color:#E7E5E4}
.dk .cB .seg-line{border-color:#302B28}
.cB .seg-line div{flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.lt .cB .seg-line div{color:#A8A29E}
.lt .cB .seg-line div.on{color:#1C1917;font-weight:700;border-color:#0D7377}
.dk .cB .seg-line div{color:#78716C}
.dk .cB .seg-line div.on{color:#E7E5E4;font-weight:700;border-color:#14B8A6}

/* C: Full card + dots */
.cC .cards{padding:0 18px 10px}
.cC .fc{margin-bottom:16px}
.cC .fc .top{padding:18px 18px 0}
.cC .fc .sr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cC .sc{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cC .sc svg{width:14px;height:14px}
.lt .cC .sc{background:#F0FDFA;border:2px solid #0D737730}
.lt .cC .sc svg{color:#0D7377}
.lt .cC .sc.amb{background:#FFFBEB;border-color:#B4530930}
.lt .cC .sc.amb svg{color:#B45309}
.dk .cC .sc{background:#112525;border:2px solid #14B8A630}
.dk .cC .sc svg{color:#2DD4BF}
.dk .cC .sc.amb{background:#2D2513;border-color:#F59E0B30}
.dk .cC .sc.amb svg{color:#F59E0B}
.cC .sl{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.lt .cC .sl{color:#A8A29E}
.dk .cC .sl{color:#78716C}
.cC .fh{font-family:'Lora',serif;font-size:15px;font-weight:700;line-height:1.4;margin-bottom:8px}
.lt .cC .fh{color:#1C1917}
.dk .cC .fh{color:#E7E5E4}
.cC .fb{font-size:12px;line-height:1.65;padding:0 18px 12px}
.lt .cC .fb{color:#78716C}
.dk .cC .fb{color:#A8A29E}
.cC .fa{margin:0 18px 14px}
.cC .bot{padding:10px 18px;display:flex;justify-content:space-between;align-items:center}
.lt .cC .bot{border-top:1px solid #E7E5E4}
.dk .cC .bot{border-top:1px solid #302B28}
.cC .dots{display:flex;gap:4px}
.cC .dot{width:6px;height:6px;border-radius:50%}
.lt .cC .dot{background:#E7E5E4}
.lt .cC .dot.on{background:#0D7377}
.lt .cC .dot.amb{background:#B45309}
.dk .cC .dot{background:#302B28}
.dk .cC .dot.on{background:#14B8A6}
.dk .cC .dot.amb{background:#F59E0B}
.cC .nh{font-size:10px;font-weight:500}
.lt .cC .nh{color:#A8A29E}
.dk .cC .nh{color:#78716C}

/* D: Lab / Gamified */
.cD .streak{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cD .stk-badge{display:flex;align-items:center;gap:4px;border-radius:16px;padding:4px 10px;font-size:10px;font-weight:700}
.cD .stk-badge svg{width:12px;height:12px}
.lt .cD .stk-badge{background:#FFFBEB;color:#B45309}
.lt .cD .stk-badge svg{color:#B45309}
.dk .cD .stk-badge{background:#2D2513;color:#FBBF24}
.dk .cD .stk-badge svg{color:#FBBF24}
.cD .xp{display:flex;align-items:center;gap:4px}
.cD .xp-bar{width:80px;height:5px;border-radius:3px;overflow:hidden}
.lt .cD .xp-bar{background:#E7E5E4}
.dk .cD .xp-bar{background:#302B28}
.cD .xp-bar .xf{height:100%;width:65%;border-radius:3px}
.lt .cD .xp-bar .xf{background:linear-gradient(90deg,#0D7377,#0D9B7F)}
.dk .cD .xp-bar .xf{background:linear-gradient(90deg,#14B8A6,#2DD4BF)}
.cD .xp-lbl{font-size:9px}
.lt .cD .xp-lbl{color:#A8A29E}
.dk .cD .xp-lbl{color:#78716C}
/* Track */
.cD .track{display:flex;align-items:center;justify-content:center;margin:0 18px 4px}
.cD .tn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;z-index:1;flex-shrink:0}
.cD .tn svg{width:14px;height:14px}
.lt .cD .tn.done{background:#0D7377;color:#FFF}
.lt .cD .tn.cur{background:#FFF;border:2px solid #0D7377;color:#0D7377;box-shadow:0 0 8px #0D737730}
.lt .cD .tn.lock{background:#F5F2EE;color:#A8A29E}
.dk .cD .tn.done{background:#14B8A6;color:#0E0D0B}
.dk .cD .tn.cur{background:#231F1D;border:2px solid #14B8A6;color:#14B8A6;box-shadow:0 0 10px #14B8A630}
.dk .cD .tn.lock{background:#211D1B;color:#78716C}
.cD .line{flex:1;height:3px;border-radius:2px}
.lt .cD .line.done{background:#0D7377}
.lt .cD .line.cur{background:linear-gradient(90deg,#0D7377,#E7E5E4)}
.lt .cD .line.lock{background:#E7E5E4}
.dk .cD .line.done{background:#14B8A6}
.dk .cD .line.cur{background:linear-gradient(90deg,#14B8A6,#302B28)}
.dk .cD .line.lock{background:#302B28}
.cD .tn-labels{display:flex;justify-content:space-around;margin:0 18px 16px;font-size:8px;font-weight:600}
.lt .cD .tn-labels{color:#A8A29E}
.dk .cD .tn-labels{color:#78716C}
.lt .cD .tn-labels .active{color:#0D7377}
.dk .cD .tn-labels .active{color:#14B8A6}
.cD .mc{margin:0 18px 10px;border-radius:12px;overflow:hidden}
.cD .mc .glow{height:2px}
.lt .cD .mc .glow{background:linear-gradient(90deg,#0D7377,#B45309)}
.dk .cD .mc .glow{background:linear-gradient(90deg,#14B8A6,#F59E0B)}
.cD .mc .inner{padding:16px}
.cD .mc .stag{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;margin-bottom:10px}
.cD .mc .stag svg{width:12px;height:12px}
.lt .cD .mc .stag{background:#F0FDFA;border:1px solid #0D737725;color:#0D7377}
.lt .cD .mc .stag svg{color:#0D7377}
.dk .cD .mc .stag{background:#14B8A610;border:1px solid #14B8A625;color:#14B8A6}
.dk .cD .mc .stag svg{color:#14B8A6}
.cD .mc .mh{font-size:14px;font-weight:800;line-height:1.4;margin-bottom:8px}
.lt .cD .mc .mh{color:#1C1917}
.dk .cD .mc .mh{color:#E7E5E4}
.cD .mc .mb{font-size:12px;line-height:1.65;margin-bottom:10px}
.lt .cD .mc .mb{color:#78716C}
.dk .cD .mc .mb{color:#A8A29E}
.cD .mc .ibox{border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:6px}
.cD .mc .ibox svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
.lt .cD .mc .ibox{background:#F0FDFA;border:1px solid #0D737720}
.lt .cD .mc .ibox svg{color:#0D7377}
.dk .cD .mc .ibox{background:#14B8A610;border:1px solid #14B8A620}
.dk .cD .mc .ibox svg{color:#2DD4BF}
.cD .mc .ibox .it{font-size:9px;font-weight:700;letter-spacing:.5px;margin-bottom:2px}
.lt .cD .mc .ibox .it{color:#0D7377}
.dk .cD .mc .ibox .it{color:#2DD4BF}
.cD .mc .ibox .ib{font-size:11px;line-height:1.5}
.lt .cD .mc .ibox .ib{color:#78716C}
.dk .cD .mc .ibox .ib{color:#A8A29E}
.cD .prog{margin:0 18px 8px;border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.lt .cD .prog{background:#F5F2EE;border:1px solid #E7E5E4}
.dk .cD .prog{background:#211D1B;border:1px solid #302B28}
.cD .prog .pl{font-size:11px;font-weight:600}
.lt .cD .prog .pl{color:#78716C}
.dk .cD .prog .pl{color:#A8A29E}
.cD .prog .pr{font-size:11px;font-weight:800}
.lt .cD .prog .pr{color:#B45309}
.dk .cD .prog .pr{color:#FBBF24}
.cD .next-btn{margin:0 18px 10px;text-align:center;border-radius:10px;padding:10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px}
.cD .next-btn svg{width:14px;height:14px}
.lt .cD .next-btn{background:linear-gradient(90deg,#0D737715,#B4530915);border:1px solid #0D737730;color:#0D7377}
.lt .cD .next-btn svg{color:#0D7377}

    B:`<div class="c-hdr"><h2>B. The Codex</h2><p>${en?'Magazine editorial — Vol. numbering + large decorative numbers':'매거진 에디토리얼 — Vol. 넘버링 + 큰 장식 숫자'}</p>

    <div class="grid"><div class="phone-col"><div class="phone ${th} cB">${statusBar}
    <div class="scr">
      <div class="hdr"><div class="r1"><span class="vol">VOL. 042</span><span class="dt">${dt}</span></div>${badges}
      <div class="hero">${title}</div><div class="hero-s">${sub}</div>
      <div class="orn">◆ ◇ ◆</div></div>
      <div class="seg-line"><div class="on">${tab_i}</div><div>${tab_d}</div></div>
      <div class="chapters">
        <div class="ch-wrap"><div class="num">01</div>
          <div class="lr"><svg><use href="#i-bulb"/></svg><span class="en">${D.f.label_en}</span><span class="ko">${D.f.label_ko}</span></div>
          <div class="card"><div class="bl" style="padding:16px">
            <div class="ch">${fh}</div><div class="cb">${fb}</div>
            <div class="cs tl"><svg><use href="#i-thought"/></svg> ${fs}</div>
          </div></div>
          <div class="kws">${D.kw.map(k=>`<span class="kw">${k}</span>`).join('')}</div>
        </div>
        <div class="ch-wrap"><div class="num">02</div>
          <div class="lr"><svg><use href="#i-cpu"/></svg><span class="en">${D.a.label_en}</span><span class="ko">${D.a.label_ko}</span></div>
          <div class="card"><div class="bl" style="padding:16px">
            <div class="ch">${ah}</div><div class="cb">${ab}</div>
            <div class="cs tl"><svg><use href="#i-wrench"/></svg> ${as}</div>
          </div></div>
        </div>
        <div class="ch-wrap"><div class="num">03</div>
          <div class="lr"><svg><use href="#i-globe"/></svg><span class="en">${D.i.label_en}</span><span class="ko">${D.i.label_ko}</span></div>
          <div class="card"><div class="bl amb" style="padding:16px">
            <div class="ch">${ih}</div><div class="cb">${ib}</div>
            <div class="cs am"><svg><use href="#i-target"/></svg> ${is_}</div>
          </div></div>
        </div>
      </div>${actBar}
    </div></div></div></div>`,

    C:`<div class="c-hdr"><h2>C. The Notebook</h2><p>${en?'Full-width cards with progress dots — one card at a time focus':'풀-카드 + 프로그래스 도트 — 하나에 집중'}</p>
    <div class="c-tags"><span>${dk?'Dark':'Light'}</span><span>Full Card</span><span>Progress Dots</span></div></div>
    <div class="grid"><div class="phone-col"><div class="phone ${th} cC">${statusBar}
    <div class="scr">
      <div class="hdr"><div class="r1"><span class="tl">${snack}</span><span class="dt">‹ ${dt} ›</span></div>${badges}
      <div class="hero">${title}</div><div class="div"></div></div>
      <div class="seg"><div class="on">${tab_i}</div><div>${tab_d}</div></div>
      <div class="cards">
        <div class="fc card"><div class="top"><div class="sr"><div class="sc"><svg><use href="#i-bulb"/></svg></div><span class="sl">💡 ${fl}</span></div><div class="fh">${fh}</div></div>
        <div class="fb">${fb}</div><div class="fa cs tl"><svg><use href="#i-thought"/></svg> ${fs}</div>
        <div class="bot"><div class="dots"><div class="dot on"></div><div class="dot"></div><div class="dot"></div></div><span class="nh">${en?'Next: Application →':'다음: 응용원리 →'}</span></div></div>

        <div class="fc card"><div class="top"><div class="sr"><div class="sc"><svg><use href="#i-cpu"/></svg></div><span class="sl">⚡ ${al}</span></div><div class="fh">${ah}</div></div>
        <div class="fb">${ab}</div><div class="fa cs tl"><svg><use href="#i-wrench"/></svg> ${as}</div>
        <div class="bot"><div class="dots"><div class="dot on"></div><div class="dot on"></div><div class="dot"></div></div><span class="nh">${en?'Next: Integration →':'다음: 융합사례 →'}</span></div></div>

        <div class="fc card"><div class="top"><div class="sr"><div class="sc amb"><svg><use href="#i-globe"/></svg></div><span class="sl">🌍 ${il}</span></div><div class="fh">${ih}</div></div>
        <div class="fb">${ib}</div><div class="fa cs am"><svg><use href="#i-target"/></svg> ${is_}</div>
        <div class="bot"><div class="dots"><div class="dot on"></div><div class="dot on"></div><div class="dot amb"></div></div><span class="nh">${en?'Complete! ✓':'완료! ✓'}</span></div></div>
      </div>${actBar}
    </div></div></div></div>`,

    D:`<div class="c-hdr"><h2>D. The Lab</h2><p>${en?'Gamified progress tracker — streak, XP, step unlock':'게이미피케이션 — 스트릭, XP, 단계별 잠금해제'}</p>
    <div class="c-tags"><span>${dk?'Dark':'Light'}</span><span>Gamified</span><span>XP System</span></div></div>
    <div class="grid"><div class="phone-col"><div class="phone ${th} cD">${statusBar}
    <div class="scr">
      <div class="hdr">
        <div class="streak">
          <div class="stk-badge"><svg><use href="#i-fire"/></svg> ${en?'7-day streak':'7일 연속'}</div>
          <div class="xp"><div class="xp-bar"><div class="xf"></div></div><span class="xp-lbl">650/1K XP</span></div>
        </div>
        ${badges}
        <div class="hero">${title}</div>
        <div class="hero-s" style="font-family:inherit;font-style:normal">${sub}</div>
      </div>
      <div class="track">
        <div class="tn done"><svg><use href="#i-check"/></svg></div>
        <div class="line done"></div>
        <div class="tn cur">2</div>
        <div class="line cur"></div>
        <div class="tn lock"><svg><use href="#i-lock"/></svg></div>
      </div>
      <div class="tn-labels"><span>${fl} ✓</span><span class="active">${al}</span><span>${il} 🔒</span></div>
      <div class="mc card">
        <div class="glow"></div>
        <div class="inner">
          <div class="stag"><svg><use href="#i-cpu"/></svg> Step 2 — ${D.a.label_en}</div>
          <div class="mh">${ah}</div>
          <div class="mb">${ab}</div>
          <div class="ibox"><svg><use href="#i-bulb"/></svg><div><div class="it">KEY INSIGHT</div><div class="ib">${as}</div></div></div>
        </div>
      </div>
      <div class="prog"><span class="pl">✓ 2/3 ${en?'steps complete':'단계 완료'}</span><span class="pr">+30 XP</span></div>
      <div class="next-btn"><svg><use href="#i-zap"/></svg> ${en?'Next Step':'다음 단계로'}</div>
      <div class="act">
        <div class="ab"><svg><use href="#i-share"/></svg> ${share}</div>
      </div>
    </div></div></div></div>`,

    E:`<div class="c-hdr"><h2>E. The Scroll</h2><p>${en?'Minimal story flow — no cards, pure narrative':'미니멀 스토리 플로우 — 카드 없이 내러티브 중심'}</p>
    <div class="c-tags"><span>${dk?'Dark':'Light'}</span><span>Minimal</span><span>Narrative</span></div></div>
    <div class="grid"><div class="phone-col"><div class="phone ${th} cE">${statusBar}
    <div class="scr">
      <div class="hdr"><div class="r1"><span class="tl">${snack}</span><span class="dt">${dt}</span></div></div>
      <div class="hero" style="padding:0 22px">${title}</div>
      <div class="hero-s" style="padding:0 22px">${sub}</div>
      <div class="fsep"></div>
      <div class="story">
        <div class="ss"><div class="si"><svg><use href="#i-bulb"/></svg></div>
        <div class="sn">${fl}</div><div class="sh">${fh}</div><div class="sb2">${fb}</div>
        <div class="sa"><svg><use href="#i-thought"/></svg><span>${fs}</span></div></div>
        <div class="sep-arrow"><svg><use href="#i-down"/></svg></div>
        <div class="ss"><div class="si"><svg><use href="#i-cpu"/></svg></div>
        <div class="sn">${al}</div><div class="sh">${ah}</div><div class="sb2">${ab}</div>
        <div class="sa"><svg><use href="#i-wrench"/></svg><span>${as}</span></div></div>
        <div class="sep-arrow"><svg><use href="#i-down"/></svg></div>
        <div class="ss"><div class="si amb"><svg><use href="#i-globe"/></svg></div>
        <div class="sn">${il}</div><div class="sh">${ih}</div><div class="sb2">${ib}</div>
        <div class="sa am"><svg><use href="#i-target"/></svg><span>${is_}</span></div></div>
      </div>${actBar}
    </div></div></div></div>`,

    F:`<div class="c-hdr"><h2>F. The Atlas</h2><p>${en?'Horizontal swipe cards + connection node visualization':'가로 스와이프 카드 + 연결 노드 시각화'}</p>
    <div class="c-tags"><span>${dk?'Dark':'Light'}</span><span>Swipe Cards</span><span>Node Map</span></div></div>
    <div class="grid"><div class="phone-col"><div class="phone ${th} cF">${statusBar}
    <div class="scr">
      <div class="hdr"><div class="r1"><span class="tl">${snack}</span><span class="dt">‹ ${dt} ›</span></div>${badges}
      <div class="hero">${title}</div><div class="div"></div></div>
      <div class="seg"><div class="on">${tab_i}</div><div>${tab_d}</div></div>
      <div class="conn">
        <div class="ct"><svg><use href="#i-link"/></svg> ${en?'Connection Map':'연결 구조'}</div>
        <div class="cf">
          <div class="cn"><div class="cc n1"><svg><use href="#i-bulb"/></svg></div><div class="cl2">${fl}</div></div>
          <span class="ca">→</span>
          <div class="cn"><div class="cc n2"><svg><use href="#i-cpu"/></svg></div><div class="cl2">${al}</div></div>
          <span class="ca">→</span>
          <div class="cn"><div class="cc n3"><svg><use href="#i-globe"/></svg></div><div class="cl2">${il}</div></div>
        </div>
      </div>
      <div class="hint"><svg><use href="#i-swipe"/></svg> ${en?'Swipe to explore':'좌우로 스와이프'}</div>
      <div class="hs">
        <div class="hc card"><div class="ht"><div class="hi"><svg><use href="#i-bulb"/></svg></div><div class="htag">💡 ${fl}</div><div class="hh">${fh}</div><div class="hb">${fb}</div></div>
        <div class="hbot"><span>1 / 3</span><span>→</span></div></div>
        <div class="hc card"><div class="ht"><div class="hi"><svg><use href="#i-cpu"/></svg></div><div class="htag">⚡ ${al}</div><div class="hh">${ah}</div><div class="hb">${ab}</div></div>
        <div class="hbot"><span>2 / 3</span><span>→</span></div></div>
        <div class="hc card"><div class="ht"><div class="hi amb"><svg><use href="#i-globe"/></svg></div><div class="htag amb">🌍 ${il}</div><div class="hh">${ih}</div><div class="hb">${ib}</div></div>
        <div class="hbot"><span>3 / 3</span><span>✓</span></div></div>
      </div>${actBar}
    </div></div></div></div>`
  };

  root.innerHTML=concepts[cur];
}

render();
</script>
</body>
</html>
