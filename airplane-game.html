<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 비행기 전투 게임</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #gameCanvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            text-align: center;
            display: none;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            z-index: 20;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .restart-btn {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .restart-btn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>점수: <span id="score">0</span></div>
        <div>체력: <span id="health">100</span></div>
    </div>
    <div id="gameOver">
        <div>게임 오버!</div>
        <div style="font-size: 32px; margin-top: 10px;">최종 점수: <span id="finalScore">0</span></div>
        <button class="restart-btn" onclick="restartGame()">다시 시작</button>
    </div>
    <div id="instructions">
        <div>← → : 좌우 이동 | ↑ ↓ : 상하 이동 | Space : 발사</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 게임 변수
        let scene, camera, renderer;
        let player, enemies = [], bullets = [], enemyBullets = [];
        let score = 0, health = 100;
        let keys = {};
        let gameRunning = true;
        let lastEnemySpawn = 0;
        let lastShot = 0;

        // 초기화
        function init() {
            // Scene 생성
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

            // Camera 설정
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);

            // Renderer 설정
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 조명
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            // 플레이어 비행기 생성
            createPlayer();

            // 바닥 (구름 효과)
            createClouds();

            // 이벤트 리스너
            window.addEventListener('keydown', (e) => keys[e.key] = true);
            window.addEventListener('keyup', (e) => keys[e.key] = false);
            window.addEventListener('resize', onWindowResize);

            // 게임 루프 시작
            animate();
        }

        // 플레이어 생성
        function createPlayer() {
            const group = new THREE.Group();

            // 동체
            const bodyGeometry = new THREE.ConeGeometry(0.5, 2, 8);
            const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0x0066cc });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = Math.PI / 2;
            group.add(body);

            // 날개
            const wingGeometry = new THREE.BoxGeometry(4, 0.1, 1);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: 0x0044aa });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = -0.3;
            group.add(wings);

            // 꼬리 날개
            const tailGeometry = new THREE.BoxGeometry(2, 0.1, 0.5);
            const tail = new THREE.Mesh(tailGeometry, wingMaterial);
            tail.position.z = -1.5;
            group.add(tail);

            player = group;
            player.position.set(0, 0, 5);
            scene.add(player);
        }

        // 적 비행기 생성
        function createEnemy() {
            const group = new THREE.Group();

            const bodyGeometry = new THREE.ConeGeometry(0.4, 1.5, 8);
            const bodyMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.rotation.x = -Math.PI / 2;
            group.add(body);

            const wingGeometry = new THREE.BoxGeometry(3, 0.1, 0.8);
            const wingMaterial = new THREE.MeshPhongMaterial({ color: 0xaa0000 });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = 0.3;
            group.add(wings);

            group.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 10,
                -50
            );

            enemies.push({
                mesh: group,
                velocity: new THREE.Vector3(0, 0, 0.1 + Math.random() * 0.05),
                lastShot: 0
            });
            scene.add(group);
        }

        // 총알 생성
        function createBullet(position, velocity, isPlayer = true) {
            const geometry = new THREE.SphereGeometry(0.15, 8, 8);
            const material = new THREE.MeshPhongMaterial({
                color: isPlayer ? 0xffff00 : 0xff4444,
                emissive: isPlayer ? 0xffff00 : 0xff4444,
                emissiveIntensity: 0.5
            });
            const bullet = new THREE.Mesh(geometry, material);
            bullet.position.copy(position);

            const bulletData = {
                mesh: bullet,
                velocity: velocity.clone()
            };

            if (isPlayer) {
                bullets.push(bulletData);
            } else {
                enemyBullets.push(bulletData);
            }

            scene.add(bullet);
        }

        // 구름 생성
        function createClouds() {
            const cloudGeometry = new THREE.SphereGeometry(3, 8, 8);
            const cloudMaterial = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.6
            });

            for (let i = 0; i < 20; i++) {
                const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                cloud.position.set(
                    (Math.random() - 0.5) * 100,
                    -10 - Math.random() * 5,
                    (Math.random() - 0.5) * 100
                );
                cloud.scale.set(
                    1 + Math.random(),
                    0.5 + Math.random() * 0.5,
                    1 + Math.random()
                );
                scene.add(cloud);
            }
        }

        // 플레이어 컨트롤
        function updatePlayer() {
            if (!gameRunning) return;

            const speed = 0.3;

            if (keys['ArrowLeft'] && player.position.x > -10) {
                player.position.x -= speed;
                player.rotation.z = 0.3;
            } else if (keys['ArrowRight'] && player.position.x < 10) {
                player.position.x += speed;
                player.rotation.z = -0.3;
            } else {
                player.rotation.z *= 0.9;
            }

            if (keys['ArrowUp'] && player.position.y < 8) {
                player.position.y += speed;
            }
            if (keys['ArrowDown'] && player.position.y > -8) {
                player.position.y -= speed;
            }

            // 발사
            const now = Date.now();
            if (keys[' '] && now - lastShot > 200) {
                createBullet(
                    player.position.clone(),
                    new THREE.Vector3(0, 0, -1),
                    true
                );
                lastShot = now;
            }
        }

        // 적 업데이트
        function updateEnemies() {
            const now = Date.now();

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.mesh.position.add(enemy.velocity);

                // 적이 플레이어를 지나쳤을 때 제거
                if (enemy.mesh.position.z > 20) {
                    scene.remove(enemy.mesh);
                    enemies.splice(i, 1);
                    continue;
                }

                // 적 발사
                if (now - enemy.lastShot > 1500 && enemy.mesh.position.z > -30) {
                    const direction = new THREE.Vector3()
                        .subVectors(player.position, enemy.mesh.position)
                        .normalize()
                        .multiplyScalar(0.3);

                    createBullet(enemy.mesh.position.clone(), direction, false);
                    enemy.lastShot = now;
                }

                // 플레이어와 충돌 체크
                if (player.position.distanceTo(enemy.mesh.position) < 1.5) {
                    health -= 30;
                    updateUI();
                    scene.remove(enemy.mesh);
                    enemies.splice(i, 1);
                    createExplosion(enemy.mesh.position);

                    if (health <= 0) {
                        gameOver();
                    }
                }
            }
        }

        // 총알 업데이트
        function updateBullets() {
            // 플레이어 총알
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.mesh.position.add(bullet.velocity);

                // 범위를 벗어난 총알 제거
                if (bullet.mesh.position.z < -60) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // 적과 충돌 체크
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (bullet.mesh.position.distanceTo(enemies[j].mesh.position) < 1) {
                        score += 10;
                        updateUI();

                        createExplosion(enemies[j].mesh.position);
                        scene.remove(enemies[j].mesh);
                        enemies.splice(j, 1);

                        scene.remove(bullet.mesh);
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            // 적 총알
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                bullet.mesh.position.add(bullet.velocity);

                if (bullet.mesh.position.z > 30 ||
                    Math.abs(bullet.mesh.position.x) > 20 ||
                    Math.abs(bullet.mesh.position.y) > 20) {
                    scene.remove(bullet.mesh);
                    enemyBullets.splice(i, 1);
                    continue;
                }

                // 플레이어와 충돌 체크
                if (bullet.mesh.position.distanceTo(player.position) < 1) {
                    health -= 10;
                    updateUI();
                    scene.remove(bullet.mesh);
                    enemyBullets.splice(i, 1);

                    if (health <= 0) {
                        gameOver();
                    }
                }
            }
        }

        // 폭발 효과
        function createExplosion(position) {
            const particleCount = 20;
            const particles = [];

            for (let i = 0; i < particleCount; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 4, 4);
                const material = new THREE.MeshPhongMaterial({
                    color: Math.random() > 0.5 ? 0xff4400 : 0xffaa00
                });
                const particle = new THREE.Mesh(geometry, material);
                particle.position.copy(position);

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );

                particles.push({ mesh: particle, velocity, life: 30 });
                scene.add(particle);
            }

            // 파티클 애니메이션
            const animateParticles = () => {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.mesh.position.add(p.velocity);
                    p.life--;
                    p.mesh.material.opacity = p.life / 30;

                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        particles.splice(i, 1);
                    }
                }

                if (particles.length > 0) {
                    requestAnimationFrame(animateParticles);
                }
            };
            animateParticles();
        }

        // UI 업데이트
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('health').textContent = Math.max(0, health);
        }

        // 게임 오버
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 게임 재시작
        function restartGame() {
            // 모든 객체 제거
            enemies.forEach(e => scene.remove(e.mesh));
            bullets.forEach(b => scene.remove(b.mesh));
            enemyBullets.forEach(b => scene.remove(b.mesh));

            enemies = [];
            bullets = [];
            enemyBullets = [];
            score = 0;
            health = 100;
            gameRunning = true;

            player.position.set(0, 0, 5);

            updateUI();
            document.getElementById('gameOver').style.display = 'none';
        }

        // 창 크기 조절
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);

            if (gameRunning) {
                updatePlayer();
                updateEnemies();
                updateBullets();

                // 적 생성
                const now = Date.now();
                if (now - lastEnemySpawn > 2000) {
                    createEnemy();
                    lastEnemySpawn = now;
                }
            }

            renderer.render(scene, camera);
        }

        // 게임 시작
        init();
    </script>
</body>
</html>
